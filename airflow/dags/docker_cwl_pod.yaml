apiVersion: v1
kind: Pod
metadata:
  name: docker-cwl-pod
spec:
  restartPolicy: Never
  serviceAccountName: airflow-worker

  containers:
  - name: cwl-docker
    image: ghcr.io/unity-sds/unity-sps/sps-docker-cwl:2.0.0-alpha.3
    # image: ghcr.io/unity-sds/unity-sps/sps-docker-cwl:develop15
    imagePullPolicy: Always
    command: ["/usr/share/cwl/docker_cwl_entrypoint.sh"]
    # args: ["https://raw.githubusercontent.com/unity-sds/sbg-workflows/main/L1-to-L2-e2e.cwl", "https://raw.githubusercontent.com/unity-sds/sbg-workflows/main/L1-to-L2-e2e.dev.yml", "/scratch"]
    securityContext:
      privileged: true
    resources:
      requests:
        ephemeral-storage: "20Gi"
      limits:
        ephemeral-storage: "20Gi"
